<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>电商标题违禁词检测器 · 全类目</title>
<style>
:root{
 --bg:#0a0e17;--card:rgba(17,25,40,.85);--card2:rgba(20,30,50,.6);
 --border:rgba(100,140,255,.12);--glass:rgba(255,255,255,.03);
 --blue:#4F8CFF;--green:#22D39A;--orange:#F59E0B;--red:#F5465B;--pink:#EC4899;--purple:#8B5CF6;--cyan:#06B6D4;
 --text:#E4E8F0;--sub:#8B95A5;--muted:#475569;
 --radius:12px;--shadow:0 2px 20px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(79,140,255,.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 100%,rgba(236,72,153,.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.container{max-width:860px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}

/* Header */
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{font-size:13px;color:var(--sub)}

/* Category tabs */
.cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;justify-content:center}
.cat-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--glass);color:var(--sub);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.cat-btn:hover{background:rgba(79,140,255,.1);color:var(--text)}
.cat-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* Input area */
.input-box{position:relative;margin-bottom:14px}
.input-box textarea{width:100%;height:120px;padding:16px;background:var(--card2);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;resize:vertical;outline:none;transition:border-color .3s;line-height:1.6}
.input-box textarea:focus{border-color:var(--blue)}
.input-box textarea::placeholder{color:var(--muted)}
.char-count{position:absolute;bottom:12px;right:16px;font-size:11px;color:var(--muted)}

/* Stats bar */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat-item{flex:1;min-width:100px;padding:14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);text-align:center}
.stat-item .num{font-size:28px;font-weight:700}
.stat-item .label{font-size:11px;color:var(--sub);margin-top:4px}
.stat-item.pass .num{color:var(--green)}
.stat-item.warn .num{color:var(--orange)}
.stat-item.fail .num{color:var(--red)}

/* Optimized suggestion */
.optimized{margin-bottom:20px;background:var(--card2);border:2px solid var(--green);border-radius:var(--radius);padding:18px}
.optimized .opt-label{font-size:12px;color:var(--green);font-weight:600;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.optimized .opt-label .copy-btn{font-size:11px;padding:4px 12px;background:var(--green);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:500}
.optimized .opt-title{font-size:16px;font-weight:600;color:var(--text);line-height:1.8;word-break:break-all}
.optimized .opt-title .replaced{background:rgba(34,211,154,.15);color:var(--green);padding:1px 4px;border-radius:4px;text-decoration:underline;text-decoration-color:rgba(34,211,154,.3);text-underline-offset:3px}
.optimized .opt-tip{font-size:11px;color:var(--sub);margin-top:10px;line-height:1.6}

/* Results */
.results{margin-bottom:20px}
.result-group{margin-bottom:12px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.result-hd{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.result-hd:hover{background:rgba(255,255,255,.02)}
.result-hd .badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;color:#fff}
.result-hd .title{font-size:14px;font-weight:600;flex:1;margin-left:10px}
.result-hd .count{font-size:12px;color:var(--sub)}
.result-body{padding:0 14px 12px;display:none}
.result-group.open .result-body{display:block}
.result-group.open .result-hd{border-bottom:1px solid var(--border)}
.violation-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03)}
.violation-row:last-child{border-bottom:none}
.violation-row .hit{color:var(--red);font-weight:600;background:rgba(245,70,91,.12);padding:2px 8px;border-radius:6px;font-size:12px}
.violation-row .arrow{color:var(--sub)}
.violation-row .fix{color:var(--green);font-size:12px}

/* Word bank panel */
.word-bank{margin-top:20px}
.bank-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bank-hd h3{font-size:14px;color:var(--sub)}
.bank-cats{display:flex;flex-wrap:wrap;gap:4px}
.bank-tag{padding:2px 8px;border-radius:10px;font-size:10px;cursor:pointer;color:var(--sub);border:1px solid var(--border);background:transparent}
.bank-tag.on,.bank-tag:hover{background:rgba(79,140,255,.15);color:var(--blue);border-color:var(--blue)}
.words-grid{display:flex;flex-wrap:wrap;gap:4px;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);max-height:200px;overflow-y:auto}

/* Copy/Export bar */
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:none;transition:all .2s;font-weight:500}
.btn.primary{background:var(--blue);color:#fff}
.btn.primary:hover{background:#3B77E0}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--sub)}
.btn.ghost:hover{border-color:var(--blue);color:var(--text)}
.btn.danger{background:var(--red);color:#fff;font-size:11px;padding:4px 10px;border-radius:6px;margin-left:auto}

/* Empty state */
.empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}
.empty .icon{font-size:48px;margin-bottom:12px}

/* Responsive */
@media(max-width:600px){
 .header h1{font-size:20px}
 .stats{flex-direction:column;gap:8px}
 .stat-item{padding:10px}
 .stat-item .num{font-size:22px}
 .cat-btn{padding:5px 10px;font-size:11px}
}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;background:var(--green);color:#fff;border-radius:8px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

 <div class="header">
  <h1>🛡 电商标题违禁词检测器</h1>
  <p>全类目 · 广告法合规 · 实时检测 · 智能建议</p>
 </div>

 <!-- Category selector -->
 <div class="cats" id="cats">

  <button class="cat-btn" data-cat="medical">🏥 膏贴/器械</button>
  <button class="cat-btn" data-cat="food">🥗 食品/保健品</button>
  <button class="cat-btn" data-cat="cosmetic">💄 化妆品/护肤</button>
  <button class="cat-btn" data-cat="cloth">👕 服装/鞋包</button>

  <div class="char-count" id="cnt">0 字</div>
 </div>

 <!-- Stats -->

  <div class="stat-item warn"><div class="num" id="st-mid">0</div><div class="label">建议修改</div></div>
  <div class="stat-item fail"><div class="num" id="st-bad">0</div><div class="label">⚠ 严重违规</div></div>
 </div>

 <!-- Results -->
 <div id="results"></div>

 <!-- Optimized suggestion -->
 <div id="optimized" style="display:none"></div>

 <!-- Word bank -->
 <div class="word-bank">

  <div class="words-grid" id="wordsGrid"></div>

 </div>
</div>

<div class="toast" id="toast"></div>

 {w:'行货',c:'产品宣称',g:'digital',s:'mid',t:'需有正规渠道证明'},{w:'正品',c:'产品宣称',g:'all',s:'mid',t:'需提供授权书'},{w:'原装',c:'产品宣称',g:'digital',s:'mid',t:'需有资质'},
 // 家居特有
 {w:'零甲醛',c:'环保宣称',g:'home',s:'high',t:'需检测报告'},{w:'无甲醛',c:'环保宣称',g:'home',s:'high',t:'需检测报告'},{w:'抗菌',c:'功能宣称',g:'home',s:'high',t:'需检测报告支持'}
];

// Category mapping
var catMap = {
 all: '全类目通用',
 medical: '膏贴/医疗器械',
 food: '食品/保健品',
 cosmetic: '化妆品/护肤',
 cloth: '服装/鞋包',
 digital: '数码/电子',
 home: '家居/日用'
};

var curCat = 'all';
var curBankCat = 'all';

// ======= Helpers =======
function es(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}

function getWordsForCat(cat){
 if(cat==='all') return FW_ALL;
 return FW_ALL.filter(function(w){
  var gs = w.g.split('_');
  return gs.indexOf('all')!==-1 || gs.indexOf(cat)!==-1;
 });
}

function matchCat(cat, wordGroup){
 if(cat==='all') return true;
 var gs = wordGroup.split('_');
 return gs.indexOf('all')!==-1 || gs.indexOf(cat)!==-1;
}

// ======= Events =======
document.getElementById('input').addEventListener('input', function(){
 document.getElementById('cnt').textContent = this.value.length + ' 字';
 doCheck();
});

document.getElementById('cats').addEventListener('click', function(e){
 if(!e.target.classList.contains('cat-btn')) return;
 document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('on')});
 e.target.classList.add('on');
 curCat = e.target.dataset.cat;
 updateBankCats();
 showBankWords();
 doCheck();
});

// ======= Core =======
function doCheck(){
 var text = document.getElementById('input').value.trim();
 var words = getWordsForCat(curCat);
 var found = [];
 var seen = {};
 words.forEach(function(w){
  if(text.indexOf(w.w)!==-1 && !seen[w.w]){
   seen[w.w] = true;
   found.push(w);
  }
 });
 renderResults(found, text.length);
}

function buildOptimized(text, found){
 // Sort by position so we replace left-to-right
 var sorted = [];
 found.forEach(function(w){
  var idx = text.indexOf(w.w);
  if(idx!==-1) sorted.push({idx:idx, len:w.w.length, word:w});
 });
 sorted.sort(function(a,b){return a.idx - b.idx});
 
 // Process replacements
 var result = '';
 var pos = 0;
 sorted.forEach(function(item){
  if(item.idx < pos) return; // skip overlapping
  result += es(text.slice(pos, item.idx));
  
  var replacement = getReplacement(item.word.t);
  if(replacement === null){
   // Delete - skip the word entirely
   result += '<del style="color:var(--red);opacity:.5">' + es(item.word.w) + '</del>';
  } else {
   result += '<span class="replaced">' + es(replacement) + '</span>';
  }
  pos = item.idx + item.len;
 });
 result += es(text.slice(pos));
 return result;
}

function getReplacement(fix){
 // Parse the fix instruction to get the replacement text
 if(!fix || fix==='删除' || fix==='删除，不要暗示仿品' || fix==='删除，不能宣称消炎' || fix==='删除，不能提具体病名' || fix.indexOf('删除')===0 || fix.indexOf('严禁')===0 || fix==='平台禁止留联系方式' || fix==='不要自称第一' || fix==='需检测报告支持' || fix==='需有检测证明' || fix==='需提供授权书' || fix==='需检测报告' || fix==='需有资质' || fix==='需标注含绒量' || fix==='非真丝材质不能标注' || fix==='非羊绒不能标注' || fix==='非特证不能宣称美白' || fix==='非特证不能宣称' || fix==='需有正规渠道证明' || fix==='需检测报告' || fix==='需检测报告支持' || fix.indexOf('需')===0 || fix.indexOf('非')===0 || fix==='删除，需遵医嘱' || fix==='不能宣称减肥') return null;
 var m = fix.match(/改为[「「"""''](.+?)[」」"""'']/);
 if(m) return m[1];
 m = fix.match(/改为(.+)/);
 if(m) return m[1];
 // Couldn't parse, delete it
 return null;
}

function getPlainFix(fix){
 // Get plain text replacement (no HTML)
 if(!fix) return '';
 if(fix==='删除' || fix.indexOf('删除')===0 || fix.indexOf('严禁')===0 || fix.indexOf('需')===0 || fix.indexOf('非')===0 || fix==='平台禁止留联系方式' || fix==='不要自称第一' || fix==='不能宣称减肥') return '';
 var m = fix.match(/改为[「「"""''](.+?)[」」"""'']/);
 if(m) return m[1];
 m = fix.match(/改为(.+)/);
 if(m) return m[1];
 return '';
}

function buildPlainOptimized(text, found){
 var sorted = [];
 found.forEach(function(w){
  var idx = text.indexOf(w.w);
  if(idx!==-1) sorted.push({idx:idx, len:w.word.length, word:w});
 });
 sorted.sort(function(a,b){return a.idx - b.idx});
 var result = '';
 var pos = 0;
 sorted.forEach(function(item){
  if(item.idx < pos) return;
  result += text.slice(pos, item.idx);
  var rep = getPlainFix(item.word.t);
  result += rep;
  pos = item.idx + item.len;
 });
 result += text.slice(pos);
 return result;
}

function renderResults(found, totalLen){
 var results = document.getElementById('results');
 var bad = found.filter(function(w){return w.s==='high'});
 var mid = found.filter(function(w){return w.s==='mid'});
 
 document.getElementById('st-word').textContent = totalLen;
 document.getElementById('st-bad').textContent = bad.length;
 document.getElementById('st-mid').textContent = mid.length;
 document.getElementById('st-safe').textContent = found.length ? totalLen - bad.length - mid.length : totalLen;

 if(!found.length){
  results.innerHTML = '<div class="empty"><div class="icon">✅</div>未检测到违禁词，标题安全！</div>';
  return;
 }

 // Group by category
 var groups = {};
 found.forEach(function(w){
  if(!groups[w.c]) groups[w.c] = [];
  groups[w.c].push(w);
 });

 var html = '';
 var colors = {
  '极限词':'#F59E0B','诱导联系':'#8B5CF6','品牌侵权':'#F5465B','医疗功效':'#F5465B',
  '疾病名称':'#F5465B','医疗用语':'#F5465B','功效断言':'#F5465B','安全断言':'#F5465B',
  '恐吓诱导':'#F59E0B','症状暗示':'#F59E0B','食品功效':'#F5465B','化妆品功效':'#F5465B',
  '材质夸大':'#F5465B','材质要求':'#F59E0B','产品宣称':'#F59E0B','环保宣称':'#F5465B',
  '功能宣称':'#F5465B'
 };

 Object.keys(groups).forEach(function(cat){
  var items = groups[cat];
  var high = items.filter(function(w){return w.s==='high'}).length;
  var mid = items.filter(function(w){return w.s==='mid'}).length;
  var color = colors[cat] || '#F59E0B';
  
  html += '<div class="result-group open" onclick="toggleGroup(this)">';
  html += '<div class="result-hd">';
  html += '<span class="badge" style="background:'+color+'">'+cat+'</span>';
  html += '<span class="title">'+(high?high+' 处严重 · ':'')+(mid?mid+' 处建议修改':'')+'</span>';
  html += '<span class="count">'+items.length+'项 ▼</span>';
  html += '</div>';
  html += '<div class="result-body">';
  
  items.forEach(function(w){
   var sev = w.s==='high'?'🔴':'🟡';
   html += '<div class="violation-row">';
   html += '<span class="hit">'+sev+' '+es(w.w)+'</span>';
   html += '<span class="arrow">→</span>';
   html += '<span class="fix">'+es(w.t)+'</span>';
   html += '</div>';
  });
  
  html += '</div></div>';
 });

 results.innerHTML = html;
 
 // Build optimized suggestion
 var text = document.getElementById('input').value.trim();
 var opt = document.getElementById('optimized');
 if(found.length && text){
  var optimizedHTML = buildOptimized(text, found);
  var optimizedPlain = buildPlainOptimized(text, found);
  opt.innerHTML = '<div class="optimized">' +
   '<div class="opt-label">✨ 优化后可采用的标题 <button class="copy-btn" onclick="copyOptimized()" data-opt="' + es(optimizedPlain) + '">📋 复制</button></div>' +
   '<div class="opt-title">' + optimizedHTML + '</div>' +
   '<div class="opt-tip">💡 绿色下划线 = 已替换的违禁词，红色删除线 = 已移除的违禁词</div>' +
   '</div>';
  opt.style.display = 'block';
 } else {
  opt.innerHTML = '';
  opt.style.display = 'none';
 }
}

function toggleGroup(el){
 el.classList.toggle('open');
}

// ======= Word Bank =======
var bankCats = [];
function updateBankCats(){
 var words = getWordsForCat(curCat);
 var cats = {};
 words.forEach(function(w){
  if(!cats[w.c]) cats[w.c] = true;
 });
 bankCats = ['all'].concat(Object.keys(cats));
 
 var html = '<span class="bank-tag on" onclick="showBank(\'all\')">全部 ('+words.length+')</span>';
 bankCats.forEach(function(c, i){
  if(i===0) return;
  var cnt = words.filter(function(w){return w.c===c}).length;
  html += '<span class="bank-tag" onclick="showBank(\''+c+'\')">'+c+' ('+cnt+')</span>';
 });
 document.getElementById('bankCats').innerHTML = html;
 curBankCat = 'all';
 showBankWords();
}

function showBank(cat){
 curBankCat = cat || curBankCat;
 document.querySelectorAll('.bank-tag').forEach(function(t){t.classList.remove('on')});
 event && event.target && event.target.classList.add('on');
 showBankWords();
}

function showBankWords(){
 var words = getWordsForCat(curCat);
 if(curBankCat !== 'all'){
  words = words.filter(function(w){return w.c===curBankCat});
 }
 
 var html = '';
 words.forEach(function(w){
  var sevColor = w.s==='high'?'#F5465B':'#F59E0B';
  html += '<span style="font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid '+sevColor+';color:'+sevColor+';margin:2px" title="'+es(w.t)+'">'+es(w.w)+'</span>';
 });
 document.getElementById('wordsGrid').innerHTML = html || '<span style="font-size:12px;color:var(--muted)">暂无词条</span>';
}

// ======= Export =======
function copyOptimized(){
 var btn = document.querySelector('.optimized .copy-btn');
 var txt = btn.getAttribute('data-opt') || '';
 if(txt){
  navigator.clipboard.writeText(txt).then(function(){toast('优化标题已复制！')});
 } else {
  toast('暂无优化标题');
 }
}

function copyReport(){
 var text = document.getElementById('input').value.trim();
 if(!text){toast('请先输入检测内容');return}
 var found = [];
 var words = getWordsForCat(curCat);
 var seen = {};
 words.forEach(function(w){
  if(text.indexOf(w.w)!==-1 && !seen[w.w]){seen[w.w]=true;found.push(w)}
 });
 
 var report = '电商标题违禁词检测报告\n';
 report += '类目：' + catMap[curCat] + '\n';
 report += '检测标题：' + text + '\n\n';
 
 if(!found.length){
  report += '✅ 未检测到违禁词\n';
 } else {
  var groups = {};
  found.forEach(function(w){
   if(!groups[w.c]) groups[w.c] = [];
   groups[w.c].push(w);
  });
  Object.keys(groups).forEach(function(cat){
   report += '【' + cat + '】\n';
   groups[cat].forEach(function(w){
    report += '  ' + w.w + ' → ' + w.t + '\n';
   });
   report += '\n';
  });
 }
 
 navigator.clipboard.writeText(report).then(function(){toast('报告已复制！')});
}

function exportHTML(){
 var text = document.getElementById('input').value.trim();
 if(!text){toast('请先输入检测内容');return}
 var found = [];
 var words = getWordsForCat(curCat);
 var seen = {};
 words.forEach(function(w){
  if(text.indexOf(w.w)!==-1 && !seen[w.w]){seen[w.w]=true;found.push(w)}
 });
 
 var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>违禁词检测报告</title><style>body{font-family:sans-serif;max-width:700px;margin:40px auto;padding:20px;background:#0a0e17;color:#e4e8f0}h1{color:#4F8CFF}.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;color:#fff}.hit{color:#F5465B}.fix{color:#22D39A}.group{margin:16px 0;padding:12px;background:rgba(255,255,255,.03);border-radius:8px}.row{padding:4px 0;font-size:13px}</style></head><body><h1>违禁词检测报告</h1><p>类目：'+catMap[curCat]+' | 检测时间：'+new Date().toLocaleString()+'</p><p>标题：'+es(text)+'</p>';
 
 if(!found.length){
  h += '<p style="color:#22D39A">✅ 未检测到违禁词</p>';
 } else {
  var groups = {};
  found.forEach(function(w){
   if(!groups[w.c]) groups[w.c] = [];
   groups[w.c].push(w);
  });
  Object.keys(groups).forEach(function(cat){
   h += '<div class="group"><h3>'+cat+'</h3>';
   groups[cat].forEach(function(w){
    h += '<div class="row"><span class="hit">'+es(w.w)+'</span> → <span class="fix">'+es(w.t)+'</span></div>';
   });
   h += '</div>';
  });
 }
 h += '</body></html>';
 
 var blob = new Blob([h], {type:'text/html'});
 var url = URL.createObjectURL(blob);
 var a = document.createElement('a');
 a.href = url; a.download = '违禁词检测报告_'+new Date().toISOString().slice(0,10)+'.html';
 a.click();
 toast('报告已下载！');
}

function toast(msg){
 var t = document.getElementById('toast');
 t.textContent = msg; t.classList.add('show');
 setTimeout(function(){t.classList.remove('show')}, 2000);
}

// ======= Init =======
updateBankCats();
