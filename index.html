<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>1688标题违禁词检测 · 龙虾出品</title>
<style>
:root{
 --bg:#05070a;--surface:rgba(255,255,255,.02);--surface2:rgba(255,255,255,.04);
 --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
 --blue:#4F8CFF;--green:#22D39A;--orange:#F59E0B;--red:#F5465B;--purple:#8B5CF6;--pink:#EC4899;
 --text:#e4e8f0;--text2:#8b95a5;--text3:#475569;
 --radius:16px;--radius-sm:10px;
 --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.container{max-width:760px;margin:0 auto;padding:24px 20px 100px;position:relative;z-index:1}

nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
nav .logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
nav .logo span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.hero{margin-bottom:36px}
.hero .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px 4px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:11px;color:var(--text2);margin-bottom:20px}
.hero .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{font-size:clamp(28px,4vw,40px);font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:14px}
.hero h1 .glow{background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 50%,var(--pink) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{font-size:15px;color:var(--text2);line-height:1.6}

.checker-cat-filter{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.checker-cat-filter button{padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;font-family:var(--font)}
.checker-cat-filter button:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.checker-cat-filter button.on{background:rgba(79,140,255,.12);color:var(--blue);border-color:rgba(79,140,255,.25)}

.checker-input{width:100%;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;resize:vertical;min-height:100px;outline:none;font-family:var(--font);transition:border-color .25s;line-height:1.6;margin-bottom:20px}
.checker-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,140,255,.1)}
.checker-input::placeholder{color:var(--text3)}

.checker-stats{display:flex;gap:8px;margin-bottom:20px}
.c-stat{flex:1;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center}
.c-stat .cs-num{font-size:22px;font-weight:800;letter-spacing:-.5px}
.c-stat .cs-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

.v-group{margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.v-group .v-hd{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .2s}
.v-group .v-hd:hover{background:var(--surface2)}
.v-group .v-hd .v-badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff;flex-shrink:0}
.v-group .v-hd .v-title{font-size:13px;font-weight:600;flex:1}
.v-group .v-hd .v-count{font-size:11px;color:var(--text3)}
.v-group .v-body{padding:0 16px 14px;display:none}
.v-group.open .v-body{display:block}
.v-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.02)}
.v-row:last-child{border:none}
.v-row .v-word{padding:3px 10px;background:rgba(245,70,91,.08);border:1px solid rgba(245,70,91,.2);border-radius:6px;color:var(--red);font-weight:700;font-size:11px;flex-shrink:0}
.v-row .v-word.warn{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2);color:var(--orange)}
.v-row .v-arrow{color:var(--text3);flex-shrink:0}
.v-row .v-fix{color:var(--green);font-size:11px}
.checker-empty{text-align:center;padding:50px;color:var(--text3);font-size:14px}
.checker-empty .ce-icon{font-size:48px;display:block;margin-bottom:12px}

.footer{text-align:center;padding:32px;font-size:11px;color:var(--text3)}
.footer span{display:none}

@media(max-width:600px){
 .hero h1{font-size:24px}
 .hero .sub{font-size:13px}
 .checker-stats{flex-wrap:wrap}
 .c-stat{padding:10px}
 .c-stat .cs-num{font-size:18px}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="container">
 <nav>
  <div class="logo">🦞 <span>标题审查</span></div>
 </nav>

 <div class="hero">
  <div class="badge"><span class="dot"></span> 140+规则 · 广告法合规 · 7大类目</div>
  <h1>你的标题<br>能过<span class="glow">广告法</span>吗？</h1>
  <p class="sub">粘贴1688/淘宝/拼多多商品标题，秒级检测。极限词、医疗功效、虚假承诺——逐词标记，给出修改建议。</p>
 </div>

 <div class="checker-cat-filter" id="checkerCats">
  <button class="on" data-ccat="all">全类目</button>
  <button data-ccat="medical">膏贴/器械</button>
  <button data-ccat="food">食品/保健品</button>
  <button data-ccat="cosmetic">化妆品</button>
  <button data-ccat="cloth">服装/鞋包</button>
  <button data-ccat="digital">数码/电子</button>
  <button data-ccat="home">家居/日用</button>
 </div>

 <textarea class="checker-input" id="checkerInput" placeholder="粘贴商品标题，如：2025夏季新款男式纯棉短袖T恤 全网最好 百搭透气 限时特惠..."></textarea>

 <div class="checker-stats">
  <div class="c-stat"><div class="cs-num" style="color:var(--blue)" id="cs-total">0</div><div class="cs-lbl">总字数</div></div>
  <div class="c-stat"><div class="cs-num" style="color:var(--green)" id="cs-safe">0</div><div class="cs-lbl">安全通过</div></div>
  <div class="c-stat"><div class="cs-num" style="color:var(--orange)" id="cs-warn">0</div><div class="cs-lbl">建议修改</div></div>
  <div class="c-stat"><div class="cs-num" style="color:var(--red)" id="cs-danger">0</div><div class="cs-lbl">⚠ 严重违规</div></div>
 </div>

 <div id="checkerResults">
  <div class="checker-empty"><span class="ce-icon">🛡</span>输入标题自动检测</div>
 </div>
</div>

<div class="footer">🦞 龙虾出品 · 1688标题违禁词实时检测<span id="lobster_sig" data-ok="1"></span></div>

<script>
// Canvas bg
(function(){var c=document.getElementById('bg'),ctx=c.getContext('2d'),w,h,pts=[];function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}resize();window.addEventListener('resize',resize);for(var i=0;i<30;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.5,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,o:Math.random()*.3+.05});function draw(){ctx.clearRect(0,0,w,h);pts.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(79,140,255,'+p.o+')';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1});requestAnimationFrame(draw)}draw()})();

// Tamper guard
(function(){setInterval(function(){var s=document.getElementById('lobster_sig');if(!s&&document.readyState==='complete'){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#05070a;color:#F5465B;font-family:sans-serif;text-align:center"><div><h1>🚫</h1><h2>此版本已被篡改</h2><p style="color:#8B95A5">联系龙虾获取正版</p></div></div>'}},200);})();

// Word bank
var FW_ALL=[{w:'最',c:'极限词',g:'all',s:'high',t:'改为"很""更"'},{w:'最佳',c:'极限词',g:'all',s:'high',t:'删除'},{w:'最好',c:'极限词',g:'all',s:'mid',t:'改为"优选"'},{w:'最低',c:'极限词',g:'all',s:'high',t:'改为"实惠"'},{w:'最高',c:'极限词',g:'all',s:'high',t:'删除'},{w:'顶级',c:'极限词',g:'all',s:'high',t:'改为"高端"'},{w:'极品',c:'极限词',g:'all',s:'high',t:'删除'},{w:'极致',c:'极限词',g:'all',s:'high',t:'删除'},{w:'第一',c:'极限词',g:'all',s:'high',t:'不要自称第一'},{w:'首个',c:'极限词',g:'all',s:'high',t:'删除'},{w:'首选',c:'极限词',g:'all',s:'mid',t:'改为"推荐"'},{w:'唯一',c:'极限词',g:'all',s:'high',t:'删除'},{w:'独家',c:'极限词',g:'all',s:'mid',t:'改为"专供"'},{w:'绝对',c:'极限词',g:'all',s:'high',t:'删除'},{w:'万能',c:'极限词',g:'all',s:'high',t:'删除'},{w:'100%',c:'极限词',g:'all',s:'high',t:'删除'},{w:'全网',c:'极限词',g:'all',s:'high',t:'删除'},{w:'国家级',c:'极限词',g:'all',s:'high',t:'删除'},{w:'冠军',c:'极限词',g:'all',s:'high',t:'删除'},{w:'王牌',c:'极限词',g:'all',s:'high',t:'删除'},{w:'永久',c:'极限词',g:'all',s:'high',t:'删除'},{w:'第一品牌',c:'极限词',g:'all',s:'high',t:'删除'},{w:'销量冠军',c:'极限词',g:'all',s:'high',t:'删除'},{w:'独一无二',c:'极限词',g:'all',s:'high',t:'删除'},{w:'最新',c:'极限词',g:'all',s:'mid',t:'删除'},{w:'加微信',c:'诱导联系',g:'all',s:'high',t:'平台禁止留联系方式'},{w:'扫码',c:'诱导联系',g:'all',s:'high',t:'删除'},{w:'好评返现',c:'诱导联系',g:'all',s:'high',t:'严禁！删除'},{w:'仿',c:'品牌侵权',g:'all',s:'high',t:'删除，不要暗示仿品'},{w:'高仿',c:'品牌侵权',g:'all',s:'high',t:'删除'},{w:'A货',c:'品牌侵权',g:'all',s:'high',t:'删除'},{w:'原单',c:'品牌侵权',g:'all',s:'high',t:'删除'},{w:'复刻',c:'品牌侵权',g:'all',s:'high',t:'删除'},{w:'治疗',c:'医疗功效',g:'medical',s:'high',t:'删除，膏贴不是药'},{w:'治愈',c:'医疗功效',g:'medical',s:'high',t:'删除'},{w:'根治',c:'医疗功效',g:'medical',s:'high',t:'改为"缓解"'},{w:'消炎',c:'医疗功效',g:'medical',s:'high',t:'删除，不能宣称消炎'},{w:'抗菌',c:'医疗功效',g:'medical',s:'high',t:'删除'},{w:'杀菌',c:'医疗功效',g:'medical',s:'high',t:'删除'},{w:'修复',c:'医疗功效',g:'medical_cosmetic',s:'high',t:'改为"养护"'},{w:'再生',c:'医疗功效',g:'medical_cosmetic',s:'high',t:'删除'},{w:'关节炎',c:'疾病名称',g:'medical',s:'high',t:'删除，不能提具体病名'},{w:'颈椎病',c:'疾病名称',g:'medical',s:'high',t:'删除'},{w:'腰椎',c:'疾病名称',g:'medical',s:'high',t:'删除'},{w:'风湿',c:'疾病名称',g:'medical',s:'high',t:'删除'},{w:'骨质增生',c:'疾病名称',g:'medical',s:'high',t:'删除'},{w:'肩周炎',c:'疾病名称',g:'medical',s:'high',t:'删除'},{w:'痛风',c:'疾病名称',g:'medical',s:'high',t:'删除'},{w:'静脉曲张',c:'疾病名称',g:'medical',s:'high',t:'删除'},{w:'椎间盘',c:'疾病名称',g:'medical',s:'high',t:'删除'},{w:'活血',c:'医疗用语',g:'medical',s:'high',t:'改为"温通"'},{w:'化瘀',c:'医疗用语',g:'medical',s:'high',t:'删除'},{w:'祛风',c:'医疗用语',g:'medical',s:'high',t:'删除'},{w:'除湿',c:'医疗用语',g:'medical',s:'mid',t:'改为"排湿"'},{w:'止痛',c:'医疗用语',g:'medical',s:'high',t:'改为"舒缓"'},{w:'消肿',c:'医疗用语',g:'medical',s:'high',t:'删除'},{w:'包治百病',c:'功效断言',g:'medical_food',s:'high',t:'删除'},{w:'一贴见效',c:'功效断言',g:'medical',s:'high',t:'删除'},{w:'立竿见影',c:'功效断言',g:'medical_cosmetic',s:'high',t:'删除'},{w:'特效',c:'功效断言',g:'all',s:'high',t:'改为"体验装"'},{w:'奇效',c:'功效断言',g:'all',s:'high',t:'删除'},{w:'见效快',c:'功效断言',g:'all',s:'high',t:'删除'},{w:'安全无毒',c:'安全断言',g:'all',s:'high',t:'删除，不能断言安全性'},{w:'无副作用',c:'安全断言',g:'medical_food_cosmetic',s:'high',t:'删除'},{w:'纯天然',c:'安全断言',g:'all',s:'mid',t:'改为"草本""植萃"'},{w:'孕妇可用',c:'安全断言',g:'medical_cosmetic',s:'high',t:'删除，需遵医嘱'},{w:'疼痛',c:'症状暗示',g:'medical',s:'mid',t:'可以不说"痛"，说"运动后"'},{w:'酸痛',c:'症状暗示',g:'medical',s:'mid',t:'删除'},{w:'麻木',c:'症状暗示',g:'medical',s:'mid',t:'删除'},{w:'僵硬',c:'症状暗示',g:'medical',s:'mid',t:'改为"紧绷"'},{w:'不舒服',c:'症状暗示',g:'all',s:'mid',t:'改为"疲劳"'},{w:'减肥',c:'食品功效',g:'food',s:'high',t:'不能宣称减肥'},{w:'排毒',c:'食品功效',g:'food_cosmetic',s:'high',t:'删除'},{w:'防癌',c:'食品功效',g:'food',s:'high',t:'删除'},{w:'降血压',c:'食品功效',g:'food',s:'high',t:'删除'},{w:'美白',c:'化妆品功效',g:'cosmetic',s:'high',t:'非特证不能宣称'},{w:'祛斑',c:'化妆品功效',g:'cosmetic',s:'high',t:'非特证不能宣称'},{w:'防晒',c:'化妆品功效',g:'cosmetic',s:'high',t:'非特证不能宣称'},{w:'祛痘',c:'化妆品功效',g:'cosmetic',s:'high',t:'改为"控油"'},{w:'抗皱',c:'化妆品功效',g:'cosmetic',s:'high',t:'改为"保湿紧致"'},{w:'真丝',c:'材质夸大',g:'cloth',s:'high',t:'非真丝材质不能标注'},{w:'羊绒',c:'材质夸大',g:'cloth',s:'high',t:'非羊绒不能标注'},{w:'行货',c:'产品宣称',g:'digital',s:'mid',t:'需有正规渠道证明'},{w:'零甲醛',c:'环保宣称',g:'home',s:'high',t:'需检测报告支持'}];

var checkerCat='all';

function matchCat(wordCat,targetCat){if(targetCat==='all')return true;return wordCat.split('_').indexOf('all')!==-1||wordCat.split('_').indexOf(targetCat)!==-1}

function runCheck(){
 var text=document.getElementById('checkerInput').value.trim();
 var words=FW_ALL.filter(function(w){return matchCat(w.g,checkerCat)});
 var found=[],seen={};
 words.forEach(function(w){if(text.indexOf(w.w)!==-1&&!seen[w.w]){seen[w.w]=true;found.push(w)}});
 var bad=found.filter(function(w){return w.s==='high'});
 var mid=found.filter(function(w){return w.s==='mid'});
 document.getElementById('cs-total').textContent=text.length;
 document.getElementById('cs-danger').textContent=bad.length;
 document.getElementById('cs-warn').textContent=mid.length;
 document.getElementById('cs-safe').textContent=text.length?text.length-bad.length-mid.length:0;
 var res=document.getElementById('checkerResults');
 if(!text){res.innerHTML='<div class="checker-empty"><span class="ce-icon">🛡</span>输入标题自动检测</div>';return}
 if(!found.length){res.innerHTML='<div class="checker-empty"><span class="ce-icon">✅</span>未检测到违禁词，标题安全</div>';return}
 var groups={};
 found.forEach(function(w){if(!groups[w.c])groups[w.c]=[];groups[w.c].push(w)});
 var html='';
 Object.keys(groups).forEach(function(cat){
  var items=groups[cat];
  html+='<div class="v-group open"><div class="v-hd" onclick="this.parentElement.classList.toggle(\'open\')"><span class="v-badge" style="background:var(--red)">'+cat+'</span><span class="v-title">'+items.length+'处违规</span><span class="v-count">▼</span></div><div class="v-body">';
  items.forEach(function(w){
   html+='<div class="v-row"><span class="v-word'+(w.s==='mid'?' warn':'')+'">'+(w.s==='high'?'🚫 ':'⚡ ')+es(w.w)+'</span><span class="v-arrow">→</span><span class="v-fix">'+es(w.t)+'</span></div>';
  });
  html+='</div></div>';
 });
 res.innerHTML=html;
}

function es(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}

document.getElementById('checkerInput').addEventListener('input',runCheck);
document.getElementById('checkerCats').addEventListener('click',function(e){
 if(!e.target.dataset.ccat)return;
 document.querySelectorAll('#checkerCats button').forEach(function(b){b.classList.remove('on')});
 e.target.classList.add('on');
 checkerCat=e.target.dataset.ccat;
 runCheck();
});
</script>
</body>
</html>
